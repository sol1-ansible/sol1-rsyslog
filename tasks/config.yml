---
- name: Deploy listener configuration
  template:
    src: 99-remote-collector.conf.j2
    dest: /etc/rsyslog.d/99-remote-collector.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart rsyslog

- name: Validate rsyslog configuration
  command: rsyslogd -N1
  register: rsyslog_validate
  changed_when: false
  failed_when: rsyslog_validate.rc != 0

- name: Alert if rsyslog configuration is invalid
  debug:
    msg: "rsyslog configuration validation failed:\n{{ rsyslog_validate.stderr }}"
  when: rsyslog_validate.rc != 0

- name: Ensure rsyslog is enabled and running
  service:
    name: rsyslog
    state: started
    enabled: true

- name: Check if firewall-cmd is available
  command: which firewall-cmd
  register: _rsyslog_firewall_cmd_check
  changed_when: false
  failed_when: false
  when: rsyslog_configure_firewall | bool

- name: Open firewall port (firewalld)
  command: firewall-cmd --permanent --add-port={{ rsyslog_listener_port }}/{{ item }}
  register: _rsyslog_firewalld_result
  changed_when: "'ALREADY_ENABLED' not in _rsyslog_firewalld_result.stdout"
  loop: "{{ rsyslog_listener_proto }}"
  when: rsyslog_configure_firewall | bool and (_rsyslog_firewall_cmd_check.rc | default(1)) == 0
  notify: reload firewalld